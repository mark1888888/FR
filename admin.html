<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FlowRich 管理後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3348;
  --primary:#6c63ff;--primary-light:#8b83ff;--accent:#00d2ff;
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;--pink:#ec4899;
  --text:#e8e8f0;--text2:#9ca3af;--text3:#6b7280;
}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;font-size:15px;
}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}

/* 登入區塊 */
.login-overlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:48px;width:420px;max-width:95vw;text-align:center;
}
.login-box h1{
  font-size:28px;margin-bottom:4px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.login-box .subtitle{color:var(--text2);margin-bottom:28px;font-size:14px}
.login-box input{
  width:100%;padding:14px 18px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:15px;margin-bottom:12px;text-align:center;
}
.login-box input[type="password"]{letter-spacing:4px}
.login-box input:focus{outline:none;border-color:var(--primary)}
.btn-primary{
  width:100%;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-weight:600;font-size:16px;margin-bottom:12px;min-height:48px;
}
.btn-primary:hover{opacity:.9}
.login-error{
  color:var(--red);font-size:13px;margin-bottom:12px;min-height:18px;
}

/* 管理面板 */
.admin-panel{
  display:none;max-width:1200px;margin:0 auto;padding:24px;
}
.admin-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:24px;
}
.admin-header h1{
  font-size:24px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-actions{display:flex;gap:10px;align-items:center}
.back-link{
  color:var(--accent);text-decoration:none;font-size:14px;
  display:inline-flex;align-items:center;gap:4px;
}
.back-link:hover{text-decoration:underline}
.btn-refresh{
  padding:10px 20px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);font-weight:500;font-size:14px;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-refresh:hover{border-color:var(--primary);background:var(--surface)}
.btn-logout{
  padding:10px 20px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  color:var(--red);font-weight:500;font-size:14px;
}
.btn-logout:hover{border-color:var(--red);background:rgba(239,68,68,.1)}

.stats-bar{
  display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 24px;flex:1;min-width:160px;
}
.stat-card .label{font-size:12px;color:var(--text3);margin-bottom:4px}
.stat-card .value{font-size:26px;font-weight:700;color:var(--primary-light)}

/* 使用者表格 */
.table-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow-x:auto;
}
table{width:100%;border-collapse:collapse;min-width:800px}
thead{background:var(--card)}
th{
  padding:14px 16px;text-align:left;font-weight:600;font-size:13px;
  color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  padding:12px 16px;border-bottom:1px solid var(--border);
  font-size:14px;color:var(--text);vertical-align:middle;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(108,99,255,.04)}
.mono{font-family:'Courier New',monospace;font-size:12px;color:var(--text3)}
.badge{
  display:inline-block;padding:2px 10px;border-radius:8px;
  font-size:12px;font-weight:600;background:rgba(108,99,255,.15);color:var(--primary-light);
}

.action-btns{display:flex;gap:8px;flex-wrap:nowrap}
.btn-action{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;
  white-space:nowrap;border:1px solid var(--border);
}
.btn-reset{color:var(--orange);background:rgba(245,158,11,.08)}
.btn-reset:hover{border-color:var(--orange);background:rgba(245,158,11,.15)}
.btn-delete{color:var(--red);background:rgba(239,68,68,.08)}
.btn-delete:hover{border-color:var(--red);background:rgba(239,68,68,.15)}

.loading{text-align:center;padding:48px;color:var(--text3);font-size:14px}
.empty-msg{text-align:center;padding:48px;color:var(--text3)}

/* 確認對話框 */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;z-index:10000;
}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:32px;width:400px;max-width:92vw;text-align:center;
}
.modal-box h3{font-size:18px;margin-bottom:12px}
.modal-box p{color:var(--text2);font-size:14px;margin-bottom:24px;word-break:break-all}
.modal-actions{display:flex;gap:12px;justify-content:center}
.modal-actions button{
  padding:10px 28px;border-radius:10px;font-weight:600;font-size:14px;
}
.btn-cancel{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-confirm-delete{background:var(--red);color:#fff}
.btn-confirm-delete:hover{opacity:.85}
</style>
</head>
<body>

<!-- ==================== 登入畫面 ==================== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>FlowRich</h1>
    <p class="subtitle">管理後台</p>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="管理員 Email" autocomplete="email">
    <input type="password" id="loginPwd" placeholder="密碼" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">登入</button>
    <a href="index.html" style="color:var(--text3);font-size:13px;text-decoration:none">← 返回主應用</a>
  </div>
</div>

<!-- ==================== 管理面板 ==================== -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h1>FlowRich 管理後台</h1>
    <div class="header-actions">
      <a href="index.html" class="back-link">← 返回主應用</a>
      <button class="btn-refresh" onclick="loadUsers()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115.4-6.4L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15.4 6.4L3 16"/></svg>
        重新整理
      </button>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="label">註冊使用者</div><div class="value" id="statUsers">-</div></div>
    <div class="stat-card"><div class="label">總帳戶數</div><div class="value" id="statAccounts">-</div></div>
    <div class="stat-card"><div class="label">總收入筆數</div><div class="value" id="statIncomes">-</div></div>
    <div class="stat-card"><div class="label">總支出筆數</div><div class="value" id="statExpenses">-</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>User ID</th>
          <th>帳戶數</th>
          <th>收入筆數</th>
          <th>支出筆數</th>
          <th>最後更新</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="7" class="loading">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 確認刪除對話框 -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal-box">
    <h3>確認刪除使用者</h3>
    <p>即將永久刪除此使用者及其所有資料：<br><strong id="deleteTargetEmail"></strong></p>
    <p style="color:var(--red);font-size:13px">此操作無法復原！</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<script>
/* ============ Supabase 初始化 ============ */
const SUPABASE_URL = 'https://zdghqxxydlibgqvooesn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uyC2tpnAclYTKq2OQDBOkA_uBIq1X6N';
var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ============ 管理員白名單 ============ */
const ADMIN_EMAILS = ['mark800413@gmail.com'];

let currentUser = null;
let pendingDeleteUserId = null;
let pendingDeleteEmail = null;

/* ============ 登入 ============ */
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!email || !pwd) { errEl.textContent = '請輸入 Email 與密碼'; return; }

  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { errEl.textContent = '登入失敗：' + error.message; return; }

    if (!ADMIN_EMAILS.includes(data.user.email)) {
      errEl.textContent = '您不是管理員，無法使用此頁面。';
      await _sb.auth.signOut();
      return;
    }

    currentUser = data.user;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadUsers();
  } catch (e) {
    errEl.textContent = '登入錯誤：' + e.message;
  }
}

/* Enter 鍵登入 */
document.getElementById('loginPwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginPwd').focus();
});

/* ============ 登出 ============ */
async function doLogout() {
  await _sb.auth.signOut();
  currentUser = null;
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginError').textContent = '';
}

/* ============ 自動登入檢查 ============ */
(async function checkSession() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session && ADMIN_EMAILS.includes(session.user.email)) {
    currentUser = session.user;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadUsers();
  }
})();

/* ============ 載入使用者列表 ============ */
async function loadUsers() {
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading">載入中...</td></tr>';

  try {
    const { data, error } = await _sb.rpc('get_all_user_data');
    if (error) throw error;

    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">尚無使用者資料</td></tr>';
      updateStats(0, 0, 0, 0);
      return;
    }

    let totalAccounts = 0, totalIncomes = 0, totalExpenses = 0;

    tbody.innerHTML = data.map(function(row) {
      const d = row.data || {};
      const accounts = Array.isArray(d.accounts) ? d.accounts.length : 0;
      const incomes = Array.isArray(d.incomes) ? d.incomes.length : 0;
      const expenses = Array.isArray(d.expenses) ? d.expenses.length : 0;
      totalAccounts += accounts;
      totalIncomes += incomes;
      totalExpenses += expenses;

      const updatedAt = row.updated_at
        ? new Date(row.updated_at).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
        : '-';

      return '<tr>' +
        '<td>' + escHtml(row.email || '-') + '</td>' +
        '<td class="mono">' + escHtml(row.user_id || '-') + '</td>' +
        '<td><span class="badge">' + accounts + '</span></td>' +
        '<td><span class="badge">' + incomes + '</span></td>' +
        '<td><span class="badge">' + expenses + '</span></td>' +
        '<td style="white-space:nowrap;color:var(--text2);font-size:13px">' + updatedAt + '</td>' +
        '<td class="action-btns">' +
          '<button class="btn-action btn-reset" onclick="resetPwd(\'' + escAttr(row.email) + '\')">發送密碼重設信</button>' +
          '<button class="btn-action btn-delete" onclick="openDeleteModal(\'' + escAttr(row.user_id) + '\',\'' + escAttr(row.email) + '\')">刪除資料</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    updateStats(data.length, totalAccounts, totalIncomes, totalExpenses);
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading" style="color:var(--red)">載入失敗：' + escHtml(e.message) + '</td></tr>';
  }
}

function updateStats(users, accounts, incomes, expenses) {
  document.getElementById('statUsers').textContent = users;
  document.getElementById('statAccounts').textContent = accounts;
  document.getElementById('statIncomes').textContent = incomes;
  document.getElementById('statExpenses').textContent = expenses;
}

/* ============ 發送密碼重設信 ============ */
async function resetPwd(email) {
  if (!confirm('確定要發送密碼重設信給 ' + email + '？')) return;
  try {
    const { error } = await _sb.auth.resetPasswordForEmail(email);
    if (error) throw error;
    alert('已成功發送密碼重設信至 ' + email);
  } catch (e) {
    alert('發送失敗：' + e.message);
  }
}

/* ============ 刪除使用者 ============ */
function openDeleteModal(userId, email) {
  pendingDeleteUserId = userId;
  pendingDeleteEmail = email;
  document.getElementById('deleteTargetEmail').textContent = email;
  document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal() {
  pendingDeleteUserId = null;
  pendingDeleteEmail = null;
  document.getElementById('deleteModal').style.display = 'none';
}

async function confirmDelete() {
  if (!pendingDeleteUserId) return;
  const btn = document.querySelector('.btn-confirm-delete');
  btn.textContent = '刪除中...';
  btn.disabled = true;

  try {
    const { error } = await _sb.rpc('admin_delete_user', { target_user_id: pendingDeleteUserId });
    if (error) throw error;
    alert('已成功刪除使用者：' + pendingDeleteEmail);
    closeDeleteModal();
    loadUsers();
  } catch (e) {
    alert('刪除失敗：' + e.message);
  } finally {
    btn.textContent = '確認刪除';
    btn.disabled = false;
  }
}

/* ============ 工具函式 ============ */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}
</script>
</body>
</html>
